# 武当内容创作系统 v3.0 - Docker Compose 部署配置
# 版本: 1.0.0
# 适用于: 云服务器托管部署

version: '3.8'

services:
  # ============================================
  # 数据库层
  # ============================================
  
  postgres:
    image: postgres:15-alpine
    container_name: wudang-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-wudang_cms}
      POSTGRES_USER: ${DB_USER:-wudang}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-wudang} -d ${DB_NAME:-wudang_cms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wudang-network
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=2GB
      -c effective_cache_size=4GB
      -c maintenance_work_mem=512MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=5242kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  redis:
    image: redis:7-alpine
    container_name: wudang-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wudang-network

  # ============================================
  # 存储层
  # ============================================
  
  minio:
    image: minio/minio:latest
    container_name: wudang-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost:9001}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - wudang-network

  # ============================================
  # 应用层
  # ============================================
  
  api:
    image: wudang-cms/api:latest
    container_name: wudang-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://${DB_USER:-wudang}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-wudang_cms}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-wudang-cms}
      JWT_SECRET: ${JWT_SECRET}
      SEEDANCE_API_KEY: ${SEEDANCE_API_KEY}
      QVERIS_API_KEY: ${QVERIS_API_KEY}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen-plus}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./data/logs:/app/logs
    networks:
      - wudang-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    image: wudang-cms/worker:latest
    container_name: wudang-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER:-wudang}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-wudang_cms}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      SEEDANCE_API_KEY: ${SEEDANCE_API_KEY}
      QVERIS_API_KEY: ${QVERIS_API_KEY}
      LLM_API_KEY: ${LLM_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      - redis
      - postgres
    volumes:
      - ./data/logs:/app/logs
    networks:
      - wudang-network
    deploy:
      replicas: 2

  web:
    image: wudang-cms/web:latest
    container_name: wudang-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL: http://api:8080
    depends_on:
      - api
    networks:
      - wudang-network

  # ============================================
  # 网关层
  # ============================================
  
  nginx:
    image: nginx:alpine
    container_name: wudang-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./data/logs/nginx:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - wudang-network

  # ============================================
  # 监控层 (可选)
  # ============================================
  
  prometheus:
    image: prom/prometheus:latest
    container_name: wudang-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - wudang-network

  grafana:
    image: grafana/grafana:latest
    container_name: wudang-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - wudang-network

networks:
  wudang-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
